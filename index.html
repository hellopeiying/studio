<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peiying Loh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quattrocento:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body { background: #fff; color: #111; font-family: 'Outfit', sans-serif; font-size: 16px; line-height: 1.65; overflow-x: hidden; }
img { display: block; width: 100%; height: 100%; object-fit: cover; }
button { cursor: pointer; font-family: inherit; }

/* ── TOKENS ── */
:root {
  --green:  #4BA840;
  --yellow: #F2D94E;
  --black:  #111111;
  --rule:   rgba(0,0,0,0.09);
  --serif:  'Quattrocento', Georgia, serif;
  --sans:   'Outfit', sans-serif;
  --nav-h:  56px;
  --pad:    clamp(1.5rem, 5vw, 3.5rem);
}

/* ── ACCENT WORDS ── */
.ag { color: var(--green); }
.ay { background: var(--yellow); color: #111; padding: 0 3px; border-radius: 1px; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--nav-h);
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 0.5px solid var(--rule);
  display: flex; align-items: center; justify-content: center;
  padding: 0 var(--pad);
}
.nav-inner { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; max-width: 1100px; position: relative; }
.nav-links { display: flex; align-items: center; gap: 4px; list-style: none; }
.nav-links a { font-size: 10px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: #111; text-decoration: none; padding: 0.45rem 0.75rem; border-radius: 2px; transition: background 0.15s; display: block; }
.nav-links a:hover { background: var(--yellow); }
.nav-sep { width: 3px; height: 3px; border-radius: 50%; background: #CCC; flex-shrink: 0; }

/* Hamburger */
.nav-toggle { display: none; position: absolute; right: 0; background: none; border: none; padding: 0.5rem; width: 44px; height: 44px; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
.nav-toggle span { display: block; width: 20px; height: 1.5px; background: #111; transition: all 0.22s; border-radius: 1px; }
.nav-toggle.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav-toggle.open span:nth-child(2) { opacity: 0; }
.nav-toggle.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

/* Mobile drawer */
.nav-drawer { display: none; position: fixed; top: var(--nav-h); left: 0; right: 0; background: rgba(255,255,255,0.98); border-bottom: 0.5px solid var(--rule); z-index: 199; padding: 0.5rem 0 1.25rem; opacity: 0; pointer-events: none; transform: translateY(-6px); transition: opacity 0.2s, transform 0.2s; }
.nav-drawer.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
.nav-drawer a { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #111; text-decoration: none; padding: 0.85rem var(--pad); border-bottom: 0.5px solid var(--rule); transition: background 0.15s; }
.nav-drawer a:hover { background: var(--yellow); }

/* ── SECTIONS ── */
.chapter-section { border-top: 0.5px solid var(--rule); }
.chapter-section:first-of-type { border-top: none; }

/* Split grid */
.split { display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - var(--nav-h)); }
.split-text { padding: var(--pad); display: flex; flex-direction: column; justify-content: center; gap: 1.25rem; }
.split-visual { position: sticky; top: var(--nav-h); height: calc(100vh - var(--nav-h)); display: flex; align-items: center; justify-content: center; overflow: hidden; border-left: 0.5px solid var(--rule); background: #fff; }

/* Chapter label */
.chapter-label { font-size: 10px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: #111; }

/* Big prose */
.prose-block { font-family: var(--serif); font-weight: 700; font-size: clamp(1.75rem, 3.5vw, 2.8rem); line-height: 1.2; color: #111; }
.prose-block p { margin-bottom: 0.6em; }
.prose-block p:last-child { margin-bottom: 0; }

/* Subtext */
.sub-text { font-size: 13px; color: #111; letter-spacing: 0.01em; }

/* Section heading (smaller prose) */
.section-heading { font-family: var(--serif); font-weight: 700; font-size: clamp(1.2rem, 2.5vw, 1.65rem); color: #111; }

/* ── WORK ENTRIES ── */
.work-list { display: flex; flex-direction: column; margin-top: 0.5rem; }
.work-entry { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; padding: 0.75rem 0; border-bottom: 0.5px solid var(--rule); }
.work-entry:first-child { border-top: 0.5px solid var(--rule); }
.we-left { display: flex; flex-direction: column; gap: 2px; }
.we-title { font-family: var(--serif); font-size: 1rem; font-weight: 700; color: #111; line-height: 1.3; }
.we-org { font-size: 12px; color: #111; }
.we-period { font-size: 11px; color: #111; white-space: nowrap; flex-shrink: 0; letter-spacing: 0.02em; }

/* ── FEATURE ENTRIES ── */
.feature-list { display: flex; flex-direction: column; margin-top: 0.5rem; }
.feature-entry { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 0.75rem; padding: 0.75rem 0; border-bottom: 0.5px solid var(--rule); text-decoration: none; color: inherit; transition: padding-left 0.15s; }
.feature-entry:first-child { border-top: 0.5px solid var(--rule); }
.feature-entry:hover { padding-left: 0.4rem; }
.feat-badge { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 1px; white-space: nowrap; flex-shrink: 0; }
.fb-podcast    { background: var(--yellow);  color: #111; }
.fb-article    { background: var(--green);   color: #fff; }
.fb-interview  { background: #111;            color: #fff; }
.fb-newsletter { background: #EBEBEB;         color: #111; }
.fb-talk       { background: #111;            color: #fff; }
.feat-title-text { font-family: var(--serif); font-size: 0.92rem; font-style: italic; color: #111; line-height: 1.35; }
.feat-year { font-size: 11px; color: #111; flex-shrink: 0; }

/* ── EXPAND / COLLAPSE ── */
.expandable-extra { display: none; }
.expandable-extra.open { display: block; }
.expand-btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  margin-top: 1rem;
  font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
  background: none; border: 1px solid var(--rule); color: #111;
  padding: 0.5rem 1rem; border-radius: 1px;
  transition: background 0.15s, border-color 0.15s;
}
.expand-btn:hover { background: var(--yellow); border-color: var(--yellow); }
.expand-btn .btn-arrow { transition: transform 0.2s; display: inline-block; }
.expand-btn.open .btn-arrow { transform: rotate(180deg); }

/* ── DAISY VISUAL ── */
.daisy-visual { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

/* ── PHOTO PLACEHOLDER ── */
.photo-placeholder { width: 100%; height: 100%; background: #F5F5F0; display: flex; align-items: center; justify-content: center; }
.photo-placeholder span { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #BBB; }

/* ── CAROUSEL ── */
.carousel { position: relative; width: 100%; height: 100%; overflow: hidden; cursor: pointer; }
.carousel-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.65s ease; display: flex; flex-direction: column; }
.carousel-slide.active { opacity: 1; }
.carousel-img { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.carousel-img img { position: absolute; inset: 0; }
.carousel-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
.carousel-caption { padding: 1.1rem var(--pad); background: #fff; border-top: 0.5px solid var(--rule); }
.carousel-caption-title { font-family: var(--serif); font-size: 1rem; font-weight: 700; color: #111; margin-bottom: 3px; }
.carousel-caption-meta { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
.carousel-tag { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 7px; border-radius: 1px; background: #F0F0F0; color: #111; }
.carousel-year { font-size: 11px; color: #111; }
.carousel-hint { font-size: 10px; color: #999; margin-left: auto; }

/* Dots */
.carousel-dots { position: absolute; bottom: 4.5rem; left: 0; right: 0; display: flex; justify-content: center; gap: 6px; z-index: 2; pointer-events: none; }
.carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(0,0,0,0.18); transition: background 0.2s, transform 0.2s; }
.carousel-dot.active { background: #111; transform: scale(1.25); }

/* ── CONTACT ── */
.contact-section { border-top: 0.5px solid var(--rule); }
.contact-inner { display: grid; grid-template-columns: 1fr 1fr; max-width: 1100px; margin: 0 auto; }
.contact-text { padding: var(--pad); display: flex; flex-direction: column; justify-content: center; gap: 1.25rem; }
.contact-links-panel { padding: var(--pad); border-left: 0.5px solid var(--rule); display: flex; flex-direction: column; justify-content: center; }
.contact-link { display: flex; justify-content: space-between; align-items: center; padding: 0.9rem 0; border-bottom: 0.5px solid var(--rule); text-decoration: none; color: #111; transition: padding-left 0.15s; min-height: 52px; }
.contact-link:first-child { border-top: 0.5px solid var(--rule); }
.contact-link:hover { padding-left: 0.4rem; }
.cl-label { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #111; min-width: 90px; }
.cl-value { font-family: var(--serif); font-size: 1.05rem; font-style: italic; color: #111; flex: 1; margin-left: 1rem; }
.cl-arrow { color: #BBB; transition: transform 0.15s, color 0.15s; }
.contact-link:hover .cl-arrow { transform: translateX(4px); color: #111; }

/* ── FOOTER ── */
footer { border-top: 0.5px solid var(--rule); padding: 1.25rem var(--pad); display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
.footer-copy { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #111; }
.footer-link { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #111; text-decoration: none; }
.footer-link:hover { text-decoration: underline; }

/* ── SCROLL REVEAL ── */
.reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.65s ease, transform 0.65s ease; }
.reveal.visible { opacity: 1; transform: translateY(0); }

/* ══════════════════════════
   TABLET  ≤ 1024px
══════════════════════════ */
@media (max-width: 1024px) {
  .split-text { padding: 2.5rem; }
}

/* ══════════════════════════
   TABLET PORTRAIT  ≤ 768px
══════════════════════════ */
@media (max-width: 768px) {
  :root { --nav-h: 52px; }

  .nav-links, .nav-sep { display: none; }
  .nav-toggle { display: flex; }
  .nav-drawer { display: block; }

  /* Stack split: text top, visual bottom */
  .split { grid-template-columns: 1fr; min-height: unset; }
  .split-text { padding: 2.5rem 1.5rem 2rem; gap: 1rem; }
  .split-visual {
    position: relative; top: auto;
    height: 55vw; min-height: 280px; max-height: 420px;
    border-left: none; border-top: 0.5px solid var(--rule);
  }

  .contact-inner { grid-template-columns: 1fr; }
  .contact-links-panel { border-left: none; border-top: 0.5px solid var(--rule); padding: 1.5rem; }
  .contact-text { padding: 2.5rem 1.5rem 1.5rem; }

  footer { padding: 1.25rem 1.5rem; justify-content: center; text-align: center; }
}

/* ══════════════════════════
   MOBILE  ≤ 480px
══════════════════════════ */
@media (max-width: 480px) {
  .split-text { padding: 2rem 1.25rem 1.5rem; }
  .prose-block { font-size: clamp(1.5rem, 7vw, 2rem); }
  .split-visual { height: 70vw; min-height: 240px; }
  .work-entry { flex-direction: column; gap: 2px; }
  .we-period { align-self: flex-start; }
  .feature-entry { grid-template-columns: auto 1fr; }
  .feat-year { display: none; }
  .contact-text { padding: 2rem 1.25rem 1.25rem; }
  .contact-links-panel { padding: 1.25rem; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li class="nav-sep"></li>
      <li><a href="#work">Work</a></li>
      <li class="nav-sep"></li>
      <li><a href="#features">Features</a></li>
      <li class="nav-sep"></li>
      <li><a href="#studio">Studio</a></li>
      <li class="nav-sep"></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="nav-drawer" id="navDrawer" aria-hidden="true">
  <a href="#about">About</a>
  <a href="#work">Work</a>
  <a href="#features">Features</a>
  <a href="#studio">Studio</a>
  <a href="#contact">Contact</a>
</div>

<!-- ── ABOUT ────────────────────────────── -->
<section class="chapter-section" id="about" style="margin-top: var(--nav-h);">
  <div class="split">
    <div class="split-text reveal">
      <span class="chapter-label">About</span>
      <div class="prose-block" id="about-prose"></div>
      <p class="sub-text" id="about-location"></p>
    </div>
    <div class="split-visual">
      <div class="photo-placeholder" id="about-photo">
        <span>Photo</span>
      </div>
    </div>
  </div>
</section>

<!-- ── WORK ─────────────────────────────── -->
<section class="chapter-section" id="work">
  <div class="split">
    <div class="split-text reveal">
      <span class="chapter-label">Work</span>
      <h2 class="section-heading" id="work-heading"></h2>
      <div class="work-list" id="work-preview"></div>
      <div class="expandable-extra" id="work-extra">
        <div class="work-list" id="work-more-list"></div>
      </div>
      <button class="expand-btn" id="work-expand-btn" style="display:none;" aria-expanded="false">
        <span class="btn-label">See all roles</span>
        <span class="btn-arrow">↓</span>
      </button>
    </div>
    <div class="split-visual">
      <div class="daisy-visual" aria-hidden="true">
        <svg width="140" height="140" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(70,70)">
            <ellipse cx="0" cy="-32" rx="10" ry="22" fill="#F2D94E" transform="rotate(0)"/>
            <ellipse cx="0" cy="-32" rx="10" ry="22" fill="#F2D94E" transform="rotate(40)"/>
            <ellipse cx="0" cy="-32" rx="10" ry="22" fill="#F2D94E" transform="rotate(80)"/>
            <ellipse cx="0" cy="-32" rx="10" ry="22" fill="#F2D94E" transform="rotate(120)"/>
            <ellipse cx="0" cy="-32" rx="10" ry="22" fill="#F2D94E" transform="rotate(160)"/>
            <ellipse cx="0" cy="-32" rx="10" ry="22" fill="#F2D94E" transform="rotate(200)"/>
            <ellipse cx="0" cy="-32" rx="10" ry="22" fill="#F2D94E" transform="rotate(240)"/>
            <ellipse cx="0" cy="-32" rx="10" ry="22" fill="#F2D94E" transform="rotate(280)"/>
            <ellipse cx="0" cy="-32" rx="10" ry="22" fill="#F2D94E" transform="rotate(320)"/>
            <circle cx="0" cy="0" r="14" fill="#111"/>
          </g>
        </svg>
      </div>
    </div>
  </div>
</section>

<!-- ── FEATURES ──────────────────────────── -->
<section class="chapter-section" id="features">
  <div class="split">
    <div class="split-text reveal">
      <span class="chapter-label">Features</span>
      <h2 class="section-heading" id="features-heading"></h2>
      <div class="feature-list" id="features-preview"></div>
      <div class="expandable-extra" id="features-extra">
        <div class="feature-list" id="features-more-list"></div>
      </div>
      <button class="expand-btn" id="features-expand-btn" style="display:none;" aria-expanded="false">
        <span class="btn-label">See all features</span>
        <span class="btn-arrow">↓</span>
      </button>
    </div>
    <div class="split-visual">
      <div class="photo-placeholder" id="features-photo">
        <span>Photo</span>
      </div>
    </div>
  </div>
</section>

<!-- ── STUDIO ────────────────────────────── -->
<section class="chapter-section" id="studio">
  <div class="split">
    <div class="split-text reveal">
      <span class="chapter-label">Studio</span>
      <div class="prose-block" id="studio-prose"></div>
    </div>
    <div class="split-visual" style="padding: 0;">
      <!-- Carousel -->
      <div class="carousel" id="studioCarousel" role="region" aria-label="Studio projects">
        <div id="carouselSlides"></div>
        <div class="carousel-dots" id="carouselDots" aria-hidden="true"></div>
      </div>
    </div>
  </div>
</section>

<!-- ── CONTACT ───────────────────────────── -->
<section class="contact-section" id="contact">
  <div class="contact-inner">
    <div class="contact-text reveal">
      <span class="chapter-label">Contact</span>
      <div class="prose-block" style="font-size: clamp(1.5rem, 3vw, 2.2rem);" id="contact-prose"></div>
    </div>
    <div class="contact-links-panel reveal">
      <div id="contact-links"></div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <span class="footer-copy" id="footer-copy"></span>
  <a href="#" class="footer-link" id="footer-studio"></a>
</footer>

<script src="content.js"></script>
<script>
/* ── Helpers ── */
const $ = id => document.getElementById(id);
const el = (tag, cls) => { const e = document.createElement(tag); if (cls) e.className = cls; return e; };

function buildProse(arr) {
  return arr.map(p => `<p>${p}</p>`).join('');
}

/* ── Populate content ── */
const C = CONTENT;

// About
$('about-prose').innerHTML = buildProse(C.about.prose);
$('about-location').textContent = `${C.meta.role} · ${C.meta.location}`;
if (C.about.photo) {
  $('about-photo').innerHTML = `<img src="${C.about.photo}" alt="Peiying Loh">`;
}

// Work
$('work-heading').innerHTML = C.work.heading;
const wPrev = C.work.roles.slice(0, C.work.previewCount);
const wMore = C.work.roles.slice(C.work.previewCount);
$('work-preview').innerHTML = wPrev.map(workEntryHTML).join('');
if (wMore.length) {
  $('work-more-list').innerHTML = wMore.map(workEntryHTML).join('');
  $('work-expand-btn').style.display = 'inline-flex';
  $('work-expand-btn').querySelector('.btn-label').textContent = `See all ${C.work.roles.length} roles`;
}

// Features
$('features-heading').innerHTML = C.features.heading;
if (C.features.photo) {
  $('features-photo').innerHTML = `<img src="${C.features.photo}" alt="">`;
}
const fPrev = C.features.items.slice(0, C.features.previewCount);
const fMore = C.features.items.slice(C.features.previewCount);
$('features-preview').innerHTML = fPrev.map(featureEntryHTML).join('');
if (fMore.length) {
  $('features-more-list').innerHTML = fMore.map(featureEntryHTML).join('');
  $('features-expand-btn').style.display = 'inline-flex';
  $('features-expand-btn').querySelector('.btn-label').textContent = `See all ${C.features.items.length} features`;
}

// Studio
$('studio-prose').innerHTML = buildProse(C.studio.prose);
buildCarousel();

// Contact
$('contact-prose').innerHTML = `<p>${C.contact.prose}</p>`;
$('contact-links').innerHTML = C.contact.links.map(l => `
  <a href="${l.href}" class="contact-link"${l.external ? ' target="_blank" rel="noopener"' : ''}>
    <span class="cl-label">${l.label}</span>
    <span class="cl-value">${l.value}</span>
    <span class="cl-arrow">→</span>
  </a>`).join('');

// Footer
$('footer-copy').textContent = `© ${C.meta.year} ${C.meta.name}`;
const fsl = $('footer-studio'); fsl.href = C.meta.studio; fsl.textContent = `${C.studio.chapter ? '' : ''}Kontinentalist ↗`;

/* ── Work entry HTML ── */
function workEntryHTML(r) {
  return `<div class="work-entry">
    <div class="we-left">
      <span class="we-title">${r.title}</span>
      <span class="we-org">${r.org}</span>
    </div>
    <span class="we-period">${r.period}</span>
  </div>`;
}

/* ── Feature entry HTML ── */
function featureEntryHTML(f) {
  const badgeClass = { podcast:'fb-podcast', article:'fb-article', interview:'fb-interview', newsletter:'fb-newsletter', talk:'fb-talk' }[f.type] || 'fb-article';
  return `<a href="${f.url}" class="feature-entry"${f.url && f.url !== '#' ? ' target="_blank" rel="noopener"' : ''}>
    <span class="feat-badge ${badgeClass}">${f.type}</span>
    <span class="feat-title-text">${f.title} &mdash; ${f.publisher}</span>
    <span class="feat-year">${f.year}</span>
  </a>`;
}

/* ── Expand/collapse ── */
function setupExpandable(btnId, extraId) {
  const btn = $(btnId); const extra = $(extraId);
  if (!btn || !extra) return;
  btn.addEventListener('click', () => {
    const isOpen = extra.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    btn.setAttribute('aria-expanded', isOpen);
    const label = btn.querySelector('.btn-label');
    const baseLabel = btn.dataset.baseLabel || label.textContent;
    if (!btn.dataset.baseLabel) btn.dataset.baseLabel = baseLabel;
    label.textContent = isOpen ? 'See less' : baseLabel;
  });
}
setupExpandable('work-expand-btn', 'work-extra');
setupExpandable('features-expand-btn', 'features-extra');

/* ── Carousel ── */
function buildCarousel() {
  const projects = C.studio.projects;
  if (!projects || !projects.length) return;
  const slidesEl = $('carouselSlides');
  const dotsEl   = $('carouselDots');

  // Build slides
  projects.forEach((p, i) => {
    const slide = el('div', `carousel-slide${i === 0 ? ' active' : ''}`);
    slide.setAttribute('data-project-id', p.id);

    // Image area
    const imgArea = el('div', 'carousel-img');
    if (p.imageSrc) {
      const img = el('img'); img.src = p.imageSrc; img.alt = p.title;
      imgArea.appendChild(img);
    } else {
      // Placeholder with daisy + accent colour
      const ph = el('div', 'carousel-placeholder');
      ph.style.background = p.accentColor === '#F2D94E' ? '#FFFFF0' : p.accentColor === '#111111' ? '#F5F5F5' : '#EEF7EC';
      ph.innerHTML = daisySVG(p.accentColor);
      imgArea.appendChild(ph);
    }
    slide.appendChild(imgArea);

    // Caption
    const cap = el('div', 'carousel-caption');
    const tagsHTML = p.tags.map(t => `<span class="carousel-tag">${t}</span>`).join('');
    cap.innerHTML = `
      <div class="carousel-caption-title">${p.title}</div>
      <div class="carousel-caption-meta">
        ${tagsHTML}
        <span class="carousel-year">${p.year}</span>
        <span class="carousel-hint">View project →</span>
      </div>`;
    slide.appendChild(cap);

    // Click → project page
    slide.addEventListener('click', () => {
      window.location.href = `project.html?id=${p.id}`;
    });
    slide.style.cursor = 'pointer';

    slidesEl.appendChild(slide);

    // Dot
    const dot = el('button', `carousel-dot${i === 0 ? ' active' : ''}`);
    dot.setAttribute('aria-label', `Go to project ${i + 1}`);
    dot.addEventListener('click', e => { e.stopPropagation(); goTo(i); resetTimer(); });
    dotsEl.appendChild(dot);
  });

  let current = 0;
  let timer;
  const slides = slidesEl.querySelectorAll('.carousel-slide');
  const dots   = dotsEl.querySelectorAll('.carousel-dot');

  function goTo(idx) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (idx + projects.length) % projects.length;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
  }

  function resetTimer() {
    clearInterval(timer);
    timer = setInterval(() => goTo(current + 1), 4500);
  }

  resetTimer();

  // Touch swipe
  let touchStartX = 0;
  const carousel = $('studioCarousel');
  carousel.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
  carousel.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(dx) > 40) { goTo(current + (dx < 0 ? 1 : -1)); resetTimer(); }
  }, { passive: true });
}

function daisySVG(center) {
  const c = center === '#F2D94E' ? '#111' : center === '#111111' ? '#F2D94E' : '#111';
  return `<svg width="100" height="100" viewBox="0 0 100 100" fill="none"><g transform="translate(50,50)">
    <ellipse cx="0" cy="-24" rx="8" ry="17" fill="#F2D94E" transform="rotate(0)"/>
    <ellipse cx="0" cy="-24" rx="8" ry="17" fill="#F2D94E" transform="rotate(40)"/>
    <ellipse cx="0" cy="-24" rx="8" ry="17" fill="#F2D94E" transform="rotate(80)"/>
    <ellipse cx="0" cy="-24" rx="8" ry="17" fill="#F2D94E" transform="rotate(120)"/>
    <ellipse cx="0" cy="-24" rx="8" ry="17" fill="#F2D94E" transform="rotate(160)"/>
    <ellipse cx="0" cy="-24" rx="8" ry="17" fill="#F2D94E" transform="rotate(200)"/>
    <ellipse cx="0" cy="-24" rx="8" ry="17" fill="#F2D94E" transform="rotate(240)"/>
    <ellipse cx="0" cy="-24" rx="8" ry="17" fill="#F2D94E" transform="rotate(280)"/>
    <ellipse cx="0" cy="-24" rx="8" ry="17" fill="#F2D94E" transform="rotate(320)"/>
    <circle cx="0" cy="0" r="12" fill="${c}"/>
  </g></svg>`;
}

/* ── Hamburger ── */
const toggle = $('navToggle'), drawer = $('navDrawer');
toggle.addEventListener('click', () => {
  const open = drawer.classList.toggle('open');
  toggle.classList.toggle('open', open);
  toggle.setAttribute('aria-expanded', open);
  drawer.setAttribute('aria-hidden', !open);
  document.body.style.overflow = open ? 'hidden' : '';
});
drawer.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
  drawer.classList.remove('open');
  toggle.classList.remove('open');
  toggle.setAttribute('aria-expanded', false);
  drawer.setAttribute('aria-hidden', true);
  document.body.style.overflow = '';
}));

/* ── Active nav on scroll ── */
const sections = ['about','work','features','studio','contact'];
const navLinks = document.querySelectorAll('.nav-links a');
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      navLinks.forEach(a => {
        a.classList.toggle('active', a.getAttribute('href') === `#${e.target.id}`);
      });
    }
  });
}, { rootMargin: '-40% 0px -55% 0px' });
sections.forEach(id => { const s = $(id); if (s) io.observe(s); });

/* ── Scroll reveal ── */
const revealIO = new IntersectionObserver(
  entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
  { threshold: 0.08, rootMargin: '0px 0px -40px 0px' }
);
document.querySelectorAll('.reveal').forEach(el => revealIO.observe(el));
</script>
