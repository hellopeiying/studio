<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — Peiying Loh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quattrocento:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body { background: #fff; color: #111; font-family: 'Outfit', sans-serif; font-size: 16px; line-height: 1.65; overflow-x: hidden; }
img { display: block; width: 100%; height: 100%; object-fit: cover; }

:root {
  --green:  #4BA840;
  --yellow: #F2D94E;
  --black:  #111111;
  --rule:   rgba(0,0,0,0.09);
  --serif:  'Quattrocento', Georgia, serif;
  --sans:   'Outfit', sans-serif;
  --nav-h:  56px;
  --pad:    clamp(1.5rem, 5vw, 3.5rem);
}
.ag { color: var(--green); }
.ay { background: var(--yellow); color: #111; padding: 0 3px; border-radius: 1px; }

/* NAV */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: var(--nav-h); background: rgba(255,255,255,0.96); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 0.5px solid var(--rule); display: flex; align-items: center; padding: 0 var(--pad); }
.nav-back { font-size: 12px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #111; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: gap 0.15s; }
.nav-back:hover { gap: 0.75rem; }
.nav-home { margin-left: auto; font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #111; text-decoration: none; }
.nav-home:hover { text-decoration: underline; }

/* PROJECT LAYOUT */
.project-page { margin-top: var(--nav-h); }

.project-hero { display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - var(--nav-h)); border-bottom: 0.5px solid var(--rule); }
.project-hero-text { padding: var(--pad); display: flex; flex-direction: column; justify-content: center; gap: 1.5rem; }
.project-hero-visual { position: sticky; top: var(--nav-h); height: calc(100vh - var(--nav-h)); background: #F5F5F0; display: flex; align-items: center; justify-content: center; border-left: 0.5px solid var(--rule); overflow: hidden; }

.project-label { font-size: 10px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: #111; }
.project-year { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; color: #111; }
.project-title { font-family: var(--serif); font-weight: 700; font-size: clamp(2rem, 4vw, 3.5rem); line-height: 1.1; color: #111; letter-spacing: -0.01em; }
.project-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.project-tag { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 1px; background: #F0F0F0; color: #111; }
.project-desc { font-size: 1.05rem; line-height: 1.8; color: #111; max-width: 520px; }

/* Body content */
.project-body { max-width: 680px; margin: 0 auto; padding: var(--pad); }
.project-body-section { margin-bottom: 3rem; }
.project-body-section h2 { font-family: var(--serif); font-size: 1.4rem; font-weight: 700; color: #111; margin-bottom: 1rem; }
.project-body-section p { font-size: 1rem; line-height: 1.85; color: #111; margin-bottom: 0.9rem; }
.project-body-section p:last-child { margin-bottom: 0; }

/* Image grid */
.project-images { border-top: 0.5px solid var(--rule); padding: var(--pad); }
.project-images h2 { font-family: var(--serif); font-size: 1.4rem; font-weight: 700; color: #111; margin-bottom: 1.5rem; }
.image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
.image-slot { aspect-ratio: 4/3; background: #F0F0F0; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 1px; }
.image-slot span { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #BBB; }
.image-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* Daisy placeholder */
.project-daisy { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

/* Next/back nav */
.project-nav { display: flex; justify-content: space-between; border-top: 0.5px solid var(--rule); padding: 1.5rem var(--pad); }
.pnav-link { text-decoration: none; color: #111; display: flex; flex-direction: column; gap: 4px; transition: opacity 0.15s; }
.pnav-link:hover { opacity: 0.6; }
.pnav-dir { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #999; }
.pnav-title { font-family: var(--serif); font-size: 1rem; font-weight: 700; color: #111; }
.pnav-link.next { text-align: right; }

/* Not found */
.not-found { margin-top: var(--nav-h); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - var(--nav-h)); gap: 1.5rem; text-align: center; padding: var(--pad); }
.not-found h1 { font-family: var(--serif); font-size: 2.5rem; font-weight: 700; }
.not-found p { font-size: 1rem; color: #111; }

footer { border-top: 0.5px solid var(--rule); padding: 1.25rem var(--pad); display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
.footer-copy { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #111; }
.footer-link { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #111; text-decoration: none; }
.footer-link:hover { text-decoration: underline; }

@media (max-width: 768px) {
  .project-hero { grid-template-columns: 1fr; min-height: unset; }
  .project-hero-visual { position: relative; top: auto; height: 60vw; min-height: 260px; border-left: none; border-top: 0.5px solid var(--rule); }
  .project-hero-text { padding: 2.5rem 1.5rem; }
  .project-body { padding: 2rem 1.5rem; }
  .project-images { padding: 2rem 1.5rem; }
  .project-nav { padding: 1.5rem 1.5rem; }
  footer { padding: 1.25rem 1.5rem; justify-content: center; text-align: center; }
}

@media (max-width: 480px) {
  .project-title { font-size: clamp(1.75rem, 8vw, 2.5rem); }
  .image-grid { grid-template-columns: 1fr; }
  .project-nav { flex-direction: column; gap: 1.5rem; }
  .pnav-link.next { text-align: left; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html#studio" class="nav-back">← Back</a>
  <a href="index.html" class="nav-home">Peiying Loh</a>
</nav>

<div id="projectContent"></div>

<footer>
  <span class="footer-copy" id="footer-copy"></span>
  <a href="https://kontinentalist.com" class="footer-link" target="_blank" rel="noopener">Kontinentalist ↗</a>
</footer>

<script src="content.js"></script>
<script>
const params  = new URLSearchParams(window.location.search);
const id      = params.get('id');
const projects = CONTENT.studio.projects;
const idx     = projects.findIndex(p => p.id === id);
const project = idx > -1 ? projects[idx] : null;

document.getElementById('footer-copy').textContent = `© ${CONTENT.meta.year} ${CONTENT.meta.name}`;

function daisySVG(c) {
  const dotColor = c === '#F2D94E' ? '#111' : c === '#111111' ? '#F2D94E' : '#111';
  return `<svg width="120" height="120" viewBox="0 0 120 120" fill="none"><g transform="translate(60,60)">
    <ellipse cx="0" cy="-28" rx="9" ry="19" fill="#F2D94E" transform="rotate(0)"/>
    <ellipse cx="0" cy="-28" rx="9" ry="19" fill="#F2D94E" transform="rotate(40)"/>
    <ellipse cx="0" cy="-28" rx="9" ry="19" fill="#F2D94E" transform="rotate(80)"/>
    <ellipse cx="0" cy="-28" rx="9" ry="19" fill="#F2D94E" transform="rotate(120)"/>
    <ellipse cx="0" cy="-28" rx="9" ry="19" fill="#F2D94E" transform="rotate(160)"/>
    <ellipse cx="0" cy="-28" rx="9" ry="19" fill="#F2D94E" transform="rotate(200)"/>
    <ellipse cx="0" cy="-28" rx="9" ry="19" fill="#F2D94E" transform="rotate(240)"/>
    <ellipse cx="0" cy="-28" rx="9" ry="19" fill="#F2D94E" transform="rotate(280)"/>
    <ellipse cx="0" cy="-28" rx="9" ry="19" fill="#F2D94E" transform="rotate(320)"/>
    <circle cx="0" cy="0" r="14" fill="${dotColor}"/>
  </g></svg>`;
}

if (!project) {
  document.getElementById('projectContent').innerHTML = `
    <div class="not-found">
      <h1>Project not found.</h1>
      <p>This project doesn't exist or the link may be outdated.</p>
      <a href="index.html" style="font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#111;text-decoration:none;border-bottom:1px solid #111;padding-bottom:2px;">← Back to home</a>
    </div>`;
} else {
  // Prev / Next project links
  const prev = idx > 0 ? projects[idx - 1] : null;
  const next = idx < projects.length - 1 ? projects[idx + 1] : null;

  // Update page title
  document.title = `${project.title} — Peiying Loh`;

  const bgColor = project.accentColor === '#F2D94E' ? '#FFFFF0' : project.accentColor === '#111111' ? '#F5F5F5' : '#EEF7EC';
  const tagsHTML = project.tags.map(t => `<span class="project-tag">${t}</span>`).join('');

  const prevHTML = prev ? `<a href="project.html?id=${prev.id}" class="pnav-link prev"><span class="pnav-dir">← Previous</span><span class="pnav-title">${prev.title}</span></a>` : `<span></span>`;
  const nextHTML = next ? `<a href="project.html?id=${next.id}" class="pnav-link next"><span class="pnav-dir">Next →</span><span class="pnav-title">${next.title}</span></a>` : `<span></span>`;

  // Build 3 image slots (placeholders until real images are added)
  const imageSlots = [1, 2, 3].map(n => `
    <div class="image-slot">
      <span>Image ${n}</span>
    </div>`).join('');

  document.getElementById('projectContent').innerHTML = `
    <div class="project-page">

      <div class="project-hero">
        <div class="project-hero-text">
          <div style="display:flex;gap:1rem;align-items:center;">
            <span class="project-label">Studio</span>
            <span class="project-year">${project.year}</span>
          </div>
          <h1 class="project-title">${project.title}</h1>
          <div class="project-tags">${tagsHTML}</div>
          <p class="project-desc">${project.description}</p>
        </div>
        <div class="project-hero-visual" style="background:${bgColor};">
          <div class="project-daisy">${daisySVG(project.accentColor)}</div>
        </div>
      </div>

      <div class="project-body">
        <div class="project-body-section">
          <h2>About this project</h2>
          <p>${project.description}</p>
          <p>Add your extended project description here in <strong>content.js</strong> — expand the project object to include a <code>longDescription</code> field, then reference it here.</p>
        </div>
      </div>

      <div class="project-images">
        <h2>Images</h2>
        <div class="image-grid">${imageSlots}</div>
      </div>

      <div class="project-nav">
        ${prevHTML}
        ${nextHTML}
      </div>

    </div>`;
}
</script>
</body>
</html>
